services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      INFO: 1
      SERVICES: 1
      TASKS: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal

  status-dashboard:
    build: .
    image: status-skyhong-tw:latest
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - docker-proxy
    environment:
      DOCKER_API_URL: http://docker-proxy:2375
      CHECK_INTERVAL_SECONDS: 60
      STATUS_TARGETS_JSON: ${STATUS_TARGETS_JSON}
      AGENT_INGEST_TOKEN: ${AGENT_INGEST_TOKEN:?set in .env}
      HEARTBEAT_TOKEN: ${HEARTBEAT_TOKEN:-}
      HEARTBEATS_JSON: ${HEARTBEATS_JSON:-[]}
      EXTERNAL_HEARTBEAT_URL: ${EXTERNAL_HEARTBEAT_URL:-}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-https://status.skyhong.tw}
      MAINTENANCE_JSON: ${MAINTENANCE_JSON:-[]}
      OPENAI_ADMIN_KEY: ${OPENAI_ADMIN_KEY:-}
      OPENAI_USAGE_TIMEZONE: ${OPENAI_USAGE_TIMEZONE:-Asia/Taipei}
      OPENAI_HIGH_POOL_LIMIT: ${OPENAI_HIGH_POOL_LIMIT:-250000}
      OPENAI_MINI_POOL_LIMIT: ${OPENAI_MINI_POOL_LIMIT:-2500000}
      OPENAI_FREE_HIGH_MODELS_JSON: ${OPENAI_FREE_HIGH_MODELS_JSON:-[]}
      OPENAI_FREE_MINI_MODELS_JSON: ${OPENAI_FREE_MINI_MODELS_JSON:-["*mini*","*nano*"]}
      OPENAI_KEY_LABELS_JSON: ${OPENAI_KEY_LABELS_JSON:-{}}
      OPENAI_PROJECT_LABELS_JSON: ${OPENAI_PROJECT_LABELS_JSON:-{}}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_ALERT_WEBHOOK_URL: ${DISCORD_ALERT_WEBHOOK_URL:-}
      ALERT_FAILURE_THRESHOLD: ${ALERT_FAILURE_THRESHOLD:-2}
      CERT_WARN_DAYS: ${CERT_WARN_DAYS:-21}
      DOMAIN_WARN_DAYS: ${DOMAIN_WARN_DAYS:-30}
      CERT_CHECK_INTERVAL_HOURS: ${CERT_CHECK_INTERVAL_HOURS:-6}
    volumes:
      - status-data:/data
    networks:
      - internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.sky-status-http.rule=Host(`status.skyhong.tw`)
      - traefik.http.routers.sky-status-http.entrypoints=web
      - traefik.http.routers.sky-status-http.middlewares=redirect-to-https@file
      - traefik.http.routers.sky-status.rule=Host(`status.skyhong.tw`)
      - traefik.http.routers.sky-status.entrypoints=websecure
      - traefik.http.routers.sky-status.tls=true
      - traefik.http.routers.sky-status.tls.certresolver=letsencrypt
      - traefik.http.services.sky-status.loadbalancer.server.port=3000

networks:
  internal:
    internal: true
  dokploy-network:
    external: true

volumes:
  status-data:
